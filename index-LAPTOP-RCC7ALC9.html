<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=WindSong:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo" id="resetHome">🎬 Movie Explorer</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Movies</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    <div class="hero" id="hero">
        <h1>Movies Search</h1>
        <p class="subtitle">Search movies and discover details</p>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="Search for a movie...">
        </div>
        <div class="controls">
            <button id="searchBtn">Search</button>

            <select id="sortSelect" class="sort-dropdown">
                <option value="">Sort by</option>
                <option value="az">Title (A-Z)</option>
                <option value="za">Title (ZA)</option>
            </select>

            <select id="yearSort">
                <option value="">Year</option>
                <option value="new">Newest → Oldest</option>
                <option value="old">Oldest → Newest</option>
            </select>
        </div>
    </div>
    </div>
    <div id="statusMessage"></div>
    <div id="movieList" class="movie-list"></div>

    <script src="script.js"></script>

    <footer class="footer">
        <div class="footer-container">
            <h2 class="footer-logo">🎬 Movie Explorer</h2>
        </div>

    </footer>
</body>

</html>+
